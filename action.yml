name: "Teasr - Tease Anything"
description: "Capture project showcase assets (screenshots, GIFs) from teasr.toml"
author: "urmzd"

branding:
  icon: "camera"
  color: "purple"

inputs:
  config:
    description: "Path to teasr.toml (default: auto-discover)"
  scenes:
    description: "Comma-separated scene names to capture (default: all)"
  args:
    description: "Additional arguments passed to `teasr showme`"
  install-chrome:
    description: "Whether to install Chrome (set to 'false' if already available)"
    default: "true"
  install-fonts:
    description: "Space-separated font families to install via `teasr setup --fonts`"
  github-token:
    description: "GitHub token for downloading the binary"
    default: ${{ github.token }}

runs:
  using: "composite"
  steps:
    - name: Download teasr binary
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.github-token }}
        TEASR_REPO: ${{ github.action_repository }}
        TEASR_REF: ${{ github.action_ref }}
      run: |
        set -euo pipefail
        echo "::group::Download teasr binary"

        OS=$(uname -s | tr '[:upper:]' '[:lower:]')
        ARCH=$(uname -m)
        echo "Detected OS=$OS ARCH=$ARCH"
        case "$ARCH" in
          x86_64)        ARCH="x86_64" ;;
          aarch64|arm64) ARCH="aarch64" ;;
          *) echo "::error::Unsupported architecture: $ARCH"; exit 1 ;;
        esac
        case "$OS" in
          linux)  TARGET="${ARCH}-unknown-linux-gnu" ;;
          darwin) TARGET="${ARCH}-apple-darwin" ;;
          *) echo "::error::Unsupported OS: $OS"; exit 1 ;;
        esac

        BINARY_NAME="teasr-${TARGET}"
        DEST="$HOME/.local/bin/teasr"
        mkdir -p "$HOME/.local/bin"
        echo "Target=$TARGET Binary=$BINARY_NAME"

        # Resolve the action ref to a concrete release tag.
        # Floating tags (e.g. v1) are git tags — not releases — so we resolve
        # them to the latest release sharing the same major version.
        resolve_release_tag() {
          local api="$1" ref="$2"

          if ! command -v jq &>/dev/null; then
            echo "::error::jq is required but not found. Install jq or use a GitHub-hosted runner."
            exit 1
          fi

          local auth_args=()
          if [ -n "${GH_TOKEN:-}" ]; then
            auth_args+=(-H "Authorization: token ${GH_TOKEN}")
          fi

          # Try exact tag match (works for non-floating refs like v1.2.3).
          # curl without -f so a 404 returns JSON instead of exit 22.
          local tag
          tag=$(curl -sSL "${auth_args[@]}" -H "Accept: application/vnd.github+json" \
            "${api}/releases/tags/${ref}" 2>/dev/null \
            | jq -r '.tag_name // empty') || true

          if [ -n "$tag" ]; then
            echo "$tag"
            return
          fi

          echo "No exact release for ref=${ref}, searching by major version..." >&2
          local releases
          releases=$(curl -fsSL "${auth_args[@]}" -H "Accept: application/vnd.github+json" \
            "${api}/releases?per_page=20")

          local major
          major=$(echo "$ref" | grep -oE '^v[0-9]+') || true
          if [ -n "$major" ]; then
            echo "Matching major version prefix: ${major}" >&2
            tag=$(echo "$releases" | jq -r --arg m "${major}." \
              '[.[] | .tag_name | select(startswith($m))][0] // empty')
          fi

          if [ -z "$tag" ]; then
            echo "Falling back to latest release" >&2
            tag=$(echo "$releases" | jq -r '.[0].tag_name // empty')
          fi

          echo "$tag"
        }

        API="${GITHUB_API_URL:-https://api.github.com}/repos/${TEASR_REPO}"
        echo "Resolving ref=${TEASR_REF} via ${API}"
        RELEASE_TAG=$(resolve_release_tag "$API" "$TEASR_REF")

        if [ -z "$RELEASE_TAG" ]; then
          echo "::error::Could not resolve ref '${TEASR_REF}' to a release tag"
          exit 1
        fi

        echo "Resolved release tag: ${RELEASE_TAG}"
        URL="${GITHUB_SERVER_URL:-https://github.com}/${TEASR_REPO}/releases/download/${RELEASE_TAG}/${BINARY_NAME}"
        echo "Downloading from ${URL}"
        curl -fsSL -H "Authorization: token $GH_TOKEN" "$URL" -o "$DEST"
        chmod +x "$DEST"
        echo "$HOME/.local/bin" >> "$GITHUB_PATH"

        echo "teasr binary installed to ${DEST}"
        teasr --version
        echo "::endgroup::"

    - name: Install Chrome
      if: inputs.install-chrome == 'true'
      uses: browser-actions/setup-chrome@v1
      with:
        chrome-version: stable

    - name: Install fonts
      if: inputs.install-fonts != ''
      shell: bash
      env:
        FONTS: ${{ inputs.install-fonts }}
      run: |
        echo "Installing fonts: $FONTS"
        teasr setup --fonts "$FONTS"

    - name: Run teasr
      shell: bash
      env:
        INPUT_CONFIG: ${{ inputs.config }}
        INPUT_SCENES: ${{ inputs.scenes }}
        INPUT_ARGS: ${{ inputs.args }}
      run: |
        echo "::group::Run teasr"
        args=(showme)

        if [ -n "$INPUT_CONFIG" ]; then
          args+=(--config "$INPUT_CONFIG")
        fi

        if [ -n "$INPUT_SCENES" ]; then
          args+=(--scenes "$INPUT_SCENES")
        fi

        if [ -n "$INPUT_ARGS" ]; then
          # shellcheck disable=SC2206
          args+=($INPUT_ARGS)
        fi

        echo "Executing: teasr ${args[*]}"
        teasr "${args[@]}"
        echo "::endgroup::"
