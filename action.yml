name: "Teasr - Tease Anything"
description: "Capture project showcase assets (screenshots, GIFs) from teasr.toml"
author: "urmzd"

branding:
  icon: "camera"
  color: "purple"

inputs:
  version:
    description: "Deprecated: version is now derived from the action ref (e.g. @v0.11.0). This input is ignored."
    required: false
    default: ""
    deprecationMessage: "Version is now derived from the action ref. Use uses: urmzd/teasr@<tag> instead."
  config:
    description: "Path to teasr.toml (default: auto-discover)"
    required: false
  scenes:
    description: "Comma-separated scene names to capture (default: all)"
    required: false
  args:
    description: "Additional arguments passed to `teasr showme`"
    required: false
  install-chrome:
    description: "Whether to install Chrome (set to 'false' if already available)"
    required: false
    default: "true"
  install-fonts:
    description: "Space-separated font families to install via `teasr setup --fonts`"
    required: false

runs:
  using: "composite"
  steps:
    - name: Determine platform
      id: platform
      shell: bash
      run: |
        case "$RUNNER_OS-$RUNNER_ARCH" in
          Linux-X64)    target="x86_64-unknown-linux-gnu"   ;;
          Linux-ARM64)  target="aarch64-unknown-linux-gnu"  ;;
          macOS-X64)    target="x86_64-apple-darwin"         ;;
          macOS-ARM64)  target="aarch64-apple-darwin"        ;;
          Windows-X64)  target="x86_64-pc-windows-msvc"     ;;
          Windows-ARM64) target="aarch64-pc-windows-msvc"   ;;
          *)            echo "::error::Unsupported platform: $RUNNER_OS-$RUNNER_ARCH" ; exit 1 ;;
        esac
        echo "target=$target" >> "$GITHUB_OUTPUT"

    - name: Download teasr
      shell: bash
      env:
        TEASR_REPO: ${{ github.action_repository }}
        TEASR_REF: ${{ github.action_ref }}
        TARGET: ${{ steps.platform.outputs.target }}
      run: |
        BINARY_NAME="teasr-${TARGET}"
        if [ "$RUNNER_OS" = "Windows" ]; then
          BINARY_NAME="${BINARY_NAME}.exe"
        fi

        BASE_URL="https://github.com/${TEASR_REPO}/releases/download/${TEASR_REF}"
        curl -fsSL "${BASE_URL}/${BINARY_NAME}" -o /usr/local/bin/teasr
        curl -fsSL "${BASE_URL}/${BINARY_NAME}.sha256" -o /tmp/teasr.sha256
        (cd /usr/local/bin && sed "s/${BINARY_NAME}/teasr/" /tmp/teasr.sha256 | sha256sum -c -)
        chmod +x /usr/local/bin/teasr

        teasr --version

    - name: Install Chrome
      if: inputs.install-chrome == 'true'
      uses: browser-actions/setup-chrome@v1
      with:
        chrome-version: stable

    - name: Install fonts
      if: inputs.install-fonts != ''
      shell: bash
      env:
        FONTS: ${{ inputs.install-fonts }}
      run: teasr setup --fonts "$FONTS"

    - name: Run teasr
      shell: bash
      env:
        INPUT_CONFIG: ${{ inputs.config }}
        INPUT_SCENES: ${{ inputs.scenes }}
        INPUT_ARGS: ${{ inputs.args }}
      run: |
        args=(showme)

        if [ -n "$INPUT_CONFIG" ]; then
          args+=(--config "$INPUT_CONFIG")
        fi

        if [ -n "$INPUT_SCENES" ]; then
          args+=(--scenes "$INPUT_SCENES")
        fi

        if [ -n "$INPUT_ARGS" ]; then
          # shellcheck disable=SC2206
          args+=($INPUT_ARGS)
        fi

        teasr "${args[@]}"
