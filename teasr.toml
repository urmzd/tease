[output]
dir = "./showcase"

[[output.formats]]
output_type = "png"

[font]
family = "MonaspiceNe Nerd Font"

# ── Web: screenshot this project's GitHub page ──
[[scenes]]
type = "web"
url = "https://github.com/urmzd/teasr"
name = "github"
viewport = { width = 1280, height = 800 }
full_page = false
formats = [{ output_type = "gif" }, { output_type = "png" }]
frame_duration = 200

[[scenes.interactions]]
type = "wait"
duration = 2000
[[scenes.interactions]]
type = "snapshot"
[[scenes.interactions]]
type = "wait"
duration = 400
[[scenes.interactions]]
type = "snapshot"
[[scenes.interactions]]
type = "scroll-to"
selector = "article"
[[scenes.interactions]]
type = "wait"
duration = 800
[[scenes.interactions]]
type = "snapshot"
[[scenes.interactions]]
type = "wait"
duration = 400
[[scenes.interactions]]
type = "snapshot"

# ── Terminal: teasr --help with custom font ──
[[scenes]]
type = "terminal"
name = "cli-help"
theme = "dracula"
cols = 90
formats = [{ output_type = "gif" }, { output_type = "png" }]
frame_duration = 80

[[scenes.interactions]]
type = "type"
text = "teasr --help"
speed = 50
[[scenes.interactions]]
type = "key"
key = "enter"
[[scenes.interactions]]
type = "wait"
duration = 2000

# ── File: local HTML rendered via headless Chrome ──
[[scenes]]
type = "file"
path = "./showcase/file-demo.html"
name = "file-demo"
viewport = { width = 800, height = 600 }
formats = [{ output_type = "png" }]

[[scenes.interactions]]
type = "snapshot"

# ── Markdown: self-contained demo rendered as styled HTML ──
[[scenes]]
type = "markdown"
path = "./showcase/markdown-demo.md"
name = "markdown-demo"
theme = "light"
viewport = { width = 800, height = 600 }
formats = [{ output_type = "png" }]

[[scenes.interactions]]
type = "snapshot"
