<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>teasr — File Capture</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      background: #0d1117;
      color: #e6edf3;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    .card {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 12px;
      padding: 48px 56px;
      max-width: 560px;
      text-align: center;
    }
    h1 {
      font-size: 2rem;
      font-weight: 700;
      margin-bottom: 12px;
    }
    .accent { color: #58a6ff; }
    p {
      color: #8b949e;
      font-size: 1.05rem;
      line-height: 1.6;
      margin-bottom: 24px;
    }
    .formats {
      display: flex;
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap;
    }
    .badge {
      background: #21262d;
      border: 1px solid #30363d;
      border-radius: 6px;
      padding: 6px 16px;
      font-size: 0.85rem;
      font-family: "SFMono-Regular", Consolas, monospace;
      color: #7ee787;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>teasr <span class="accent">file</span> capture</h1>
    <p>Render local HTML, SVG, or PDF files in headless Chrome and capture them as screenshots — no server required.</p>
    <div class="formats">
      <span class="badge">.html</span>
      <span class="badge">.svg</span>
      <span class="badge">.pdf</span>
    </div>
  </div>
</body>
</html>
