name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  fsrc:
    name: fsrc
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: urmzd/fsrc@v4
        with:
          commit-message: "chore: sync embedded files [skip ci]"

  ci:
    needs: fsrc
    uses: ./.github/workflows/ci.yml

  build:
    needs: ci
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
            cross: false
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-latest
            cross: true
          - target: x86_64-apple-darwin
            runner: macos-latest
            cross: false
          - target: aarch64-apple-darwin
            runner: macos-latest
            cross: false
          - target: x86_64-pc-windows-msvc
            runner: windows-latest
            cross: false
          - target: aarch64-pc-windows-msvc
            runner: windows-latest
            cross: false
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwayland-dev libxcb1-dev libxcb-randr0-dev libxcb-shm0-dev libxcb-xfixes0-dev libxkbcommon-dev libdbus-1-dev libpipewire-0.3-dev libegl-dev libgl-dev libgbm-dev libvulkan-dev

      - name: Install cross
        if: matrix.cross
        run: cargo install cross --locked

      - name: Build
        run: |
          if [ "${{ matrix.cross }}" = "true" ]; then
            cross build --release --target ${{ matrix.target }} -p teasr
          else
            cargo build --release --target ${{ matrix.target }} -p teasr
          fi
        shell: bash

      - name: Prepare artifact
        run: |
          if [ -f "target/${{ matrix.target }}/release/teasr.exe" ]; then
            cp "target/${{ matrix.target }}/release/teasr.exe" "teasr-${{ matrix.target }}.exe"
          else
            cp "target/${{ matrix.target }}/release/teasr" "teasr-${{ matrix.target }}"
            chmod +x "teasr-${{ matrix.target }}"
          fi
        shell: bash

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: teasr-${{ matrix.target }}
          path: teasr-${{ matrix.target }}*

  release:
    needs: [ci, build, fsrc]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    outputs:
      released: ${{ steps.sr.outputs.released }}
      version: ${{ steps.sr.outputs.version }}
      tag: ${{ steps.sr.outputs.tag }}
    steps:
      - name: Generate app token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.SR_RELEASER_APP_ID }}
          private-key: ${{ secrets.SR_RELEASER_PRIVATE_KEY }}
          repositories: ${{ github.event.repository.name }}

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Install Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwayland-dev libxcb1-dev libxcb-randr0-dev libxcb-shm0-dev libxcb-xfixes0-dev libxkbcommon-dev libdbus-1-dev libpipewire-0.3-dev libegl-dev libgl-dev libgbm-dev libvulkan-dev

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release assets
        run: |
          mkdir -p release-assets
          for dir in artifacts/teasr-*/; do
            cp "$dir"/* release-assets/
          done
          chmod +x release-assets/teasr-*[!e]
          ls -la release-assets/

      - name: Authenticate with crates.io
        id: auth
        uses: rust-lang/crates-io-auth-action@v1

      - uses: urmzd/sr@v7
        id: sr
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
        with:
          github-token: ${{ steps.app-token.outputs.token }}
