<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=__VP_W__px">
<style>
/* Reset */
* { margin: 0; padding: 0; box-sizing: border-box; }

/* Base body */
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans', Helvetica, Arial, sans-serif;
  font-size: 16px;
  line-height: 1.5;
  word-wrap: break-word;
  color: __FG__;
  background: __BG__;
  padding: 32px;
  max-width: __VP_W__px;
}

/* Headings */
h1, h2, h3, h4, h5, h6 {
  margin-top: 24px;
  margin-bottom: 16px;
  font-weight: 600;
  line-height: 1.25;
  color: __HEADING__;
}
h1 { font-size: 2em; padding-bottom: 0.3em; border-bottom: 1px solid __BORDER__; }
h2 { font-size: 1.5em; padding-bottom: 0.3em; border-bottom: 1px solid __BORDER__; }
h3 { font-size: 1.25em; }
h4 { font-size: 1em; }
h5 { font-size: 0.875em; }
h6 { font-size: 0.85em; color: __MUTED__; }

/* Paragraphs & text */
p, blockquote, ul, ol, dl, table, pre, details { margin-top: 0; margin-bottom: 16px; }
a { color: __LINK__; text-decoration: none; }
a:hover { text-decoration: underline; }
strong { font-weight: 600; }

/* Lists */
ul, ol { padding-left: 2em; }
li + li { margin-top: 0.25em; }
li > p { margin-top: 16px; }

/* Task lists */
ul.contains-task-list { list-style: none; padding-left: 0; }
.task-list-item { position: relative; padding-left: 1.75em; }
.task-list-item input[type="checkbox"] {
  position: absolute;
  left: 0;
  top: 0.3em;
  margin: 0;
}

/* Blockquotes */
blockquote {
  padding: 0 1em;
  color: __MUTED__;
  border-left: 0.25em solid __BORDER__;
}
blockquote > :first-child { margin-top: 0; }
blockquote > :last-child { margin-bottom: 0; }

/* Code */
code {
  padding: 0.2em 0.4em;
  font-size: 85%;
  background: __CODE_BG__;
  border-radius: 6px;
  font-family: 'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace;
}
pre {
  padding: 16px;
  overflow: auto;
  font-size: 85%;
  line-height: 1.45;
  background: __CODE_BG__;
  border-radius: 6px;
}
pre code {
  padding: 0;
  background: transparent;
  border-radius: 0;
  font-size: 100%;
}

/* Tables */
table {
  border-spacing: 0;
  border-collapse: collapse;
  width: max-content;
  max-width: 100%;
  overflow: auto;
}
th, td {
  padding: 6px 13px;
  border: 1px solid __BORDER__;
}
th { font-weight: 600; background: __CODE_BG__; }
tr:nth-child(2n) { background: __STRIPE__; }

/* Horizontal rules */
hr {
  height: 0.25em;
  padding: 0;
  margin: 24px 0;
  background-color: __BORDER__;
  border: 0;
}

/* Images */
img { max-width: 100%; height: auto; }

/* Details/summary */
details { margin-bottom: 16px; }
summary { cursor: pointer; font-weight: 600; }

/* Footnotes */
.footnotes { font-size: 0.875em; color: __MUTED__; border-top: 1px solid __BORDER__; margin-top: 24px; padding-top: 16px; }
.footnote-ref { font-size: 0.75em; vertical-align: super; }
</style>
__SYNTAX_CSS__
__CUSTOM_CSS__
</head>
<body>
__CONTENT__
</body>
</html>
