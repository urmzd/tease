branches:
  - main

tag_prefix: "v"

commit_pattern: '^(?P<type>\w+)(?:\((?P<scope>[^)]+)\))?(?P<breaking>!)?:\s+(?P<description>.+)'

breaking_section: Breaking Changes

misc_section: Miscellaneous

types:
  - name: feat
    bump: minor
    section: Features
  - name: fix
    bump: patch
    section: Bug Fixes
  - name: perf
    bump: patch
    section: Performance
  - name: docs
    section: Documentation
  - name: refactor
    bump: patch
    section: Refactoring
  - name: revert
    section: Reverts
  - name: chore
  - name: ci
  - name: test
  - name: build
  - name: style

version_files:
  - crates/teasr-term-render/Cargo.toml
  - crates/teasr-core/Cargo.toml
  - crates/teasr-cli/Cargo.toml
  - Cargo.toml

changelog:
  file: CHANGELOG.md

stage_files:
  - Cargo.lock

floating_tags: true
