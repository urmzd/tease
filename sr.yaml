# sr v7 configuration
# Reference: https://github.com/urmzd/sr#configuration

git:
  tag_prefix: v
  floating_tag: true

commit:
  types:
    minor:
      - feat
    patch:
      - fix
      - perf
      - refactor
    none:
      - docs
      - revert
      - chore
      - ci
      - test
      - build
      - style

changelog:
  file: CHANGELOG.md
  groups:
    - name: breaking
      content:
        - breaking
    - name: features
      content:
        - feat
    - name: bug-fixes
      content:
        - fix
    - name: performance
      content:
        - perf
    - name: refactoring
      content:
        - refactor
    - name: misc
      content:
        - docs
        - revert
        - chore
        - ci
        - test
        - build
        - style

channels:
  default: stable
  branch: main
  content:
    - name: stable

packages:
  - path: .
    version_files:
      - crates/teasr-core/Cargo.toml
      - crates/teasr-cli/Cargo.toml
      - Cargo.toml
    stage_files:
      - Cargo.lock
    hooks:
      post_release:
        - cargo publish -p teasr-core
        - sleep 30
        - cargo publish -p teasr
