# sr configuration
# Reference: https://github.com/urmzd/sr#configuration

git:
  tag_prefix: v
  floating_tag: true

commit:
  types:
    minor:
      - feat
    patch:
      - fix
      - perf
      - refactor
    none:
      - docs
      - revert
      - chore
      - ci
      - test
      - build
      - style

changelog:
  file: CHANGELOG.md
  groups:
    - name: breaking
      content:
        - breaking
    - name: features
      content:
        - feat
    - name: bug-fixes
      content:
        - fix
    - name: performance
      content:
        - perf
    - name: refactoring
      content:
        - refactor
    - name: misc
      content:
        - docs
        - revert
        - chore
        - ci
        - test
        - build
        - style

channels:
  default: stable
  branch: main
  content:
    - name: stable

packages:
  - path: .
    version_files:
      - crates/teasr-core/Cargo.toml
      - crates/teasr-cli/Cargo.toml
      - Cargo.toml
    stage_files:
      - Cargo.lock
    artifacts:
      - release-assets/teasr-x86_64-unknown-linux-gnu
      - release-assets/teasr-aarch64-unknown-linux-gnu
      - release-assets/teasr-x86_64-apple-darwin
      - release-assets/teasr-aarch64-apple-darwin
      - release-assets/teasr-x86_64-pc-windows-msvc.exe
      - release-assets/teasr-aarch64-pc-windows-msvc.exe
    publish:
      type: cargo
      workspace: true
